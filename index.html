<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>自己紹介 | Ooyama</title>
  <style>
    body {
      margin: 0;
      font-family: 'Helvetica Neue', sans-serif;
      background: linear-gradient(120deg, #1e293b, #0f172a);
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: rgba(255,255,255,0.05);
      padding: 40px;
      border-radius: 20px;
      width: 420px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      text-align: center;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 28px;
      letter-spacing: 1px;
    }

    h2 {
      margin-top: 0;
      font-weight: normal;
      color: #94a3b8;
      font-size: 16px;
    }

    .section {
      margin-top: 25px;
      text-align: left;
    }

    .section h3 {
      border-bottom: 1px solid #334155;
      padding-bottom: 5px;
      margin-bottom: 10px;
    }

    .section p {
      line-height: 1.6;
    }

    .tag {
      display: inline-block;
      background: #38bdf8;
      color: #0f172a;
      padding: 5px 10px;
      border-radius: 10px;
      margin: 3px;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>おおいやま</h1>
    <h2>Student / Learner</h2>

    <div class="section">
      <h3>About Me</h3>
      <p>
        はじめまして。おおいやまです。<br>
        学ぶことが好きで、英語やプログラミングに興味があります。
      </p>
    </div>

    <div class="section">
      <h3>Interests</h3>
      <div>
        <span class="tag">English</span>
        <span class="tag">Programming</span>
        <span class="tag">Architecture</span>
        <span class="tag">SDGs</span>
      </div>
    </div>

    <div class="section">
      <h3>Message</h3>
      <p>
        新しいことに挑戦しながら、自分の可能性を広げていきたいと考えています。
      </p>
    </div>
  </div>
</body>
</html>
